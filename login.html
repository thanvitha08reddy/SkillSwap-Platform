<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">SkillSwap</a>

        <div class="ms-auto">
            <a href="index.html" class="btn btn-light me-2">Home</a>
            <a href="add.html" class="btn btn-success me-2">Add Skill</a>
            <a href="view.html" class="btn btn-info me-2">View Users</a>
            <a href="login.html" class="btn btn-primary me-2">Login</a>
            <a href="register.html" class="btn btn-warning">Register</a>
            <button class="btn btn-light ms-2" onclick="toggleDarkMode()">🌙</button>
        </div>
    </div>
</nav>

<div class="container mt-5 d-flex justify-content-center">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Login</h3>

        <form id="loginForm">
            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-primary w-100">Login</button>
        </form>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("usersLogin")) || [];

    let validUser = users.find(user => 
        user.email === email && user.password === password
    );

    if(validUser){
        alert("Login Successful!");
        window.location.href = "index.html";
    } else {
        alert("Invalid Credentials!");
    }
});
</script>

</body>
</html>
