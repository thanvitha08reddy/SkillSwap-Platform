<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">SkillSwap</a>

        <div class="ms-auto">
            <a href="index.html" class="btn btn-light me-2">Home</a>
            <a href="add.html" class="btn btn-success me-2">Add Skill</a>
            <a href="view.html" class="btn btn-info me-2">View Users</a>
            <a href="login.html" class="btn btn-primary me-2">Login</a>
            <a href="register.html" class="btn btn-warning">Register</a>
            <button class="btn btn-light ms-2" onclick="toggleDarkMode()">🌙</button>
        </div>
    </div>
</nav>

<div class="container mt-5 d-flex justify-content-center">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Register</h3>

        <form id="registerForm">
            <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-success w-100">Register</button>
        </form>

        <p class="mt-3 text-center">
            Already have account? <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("usersLogin")) || [];

document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    let user = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    users.push(user);
    localStorage.setItem("usersLogin", JSON.stringify(users));

    alert("Registered Successfully!");
    window.location.href = "login.html";
});
</script>

</body>
</html>
